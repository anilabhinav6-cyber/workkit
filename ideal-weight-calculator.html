<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0c0c0e;--ink3:#44444f;--ink4:#888896;--w:#fff;--surf:#f4f3f0;--surf2:#eae9e5;--acc:#2563ff;--accl:#dbeafe;--accd:#1d4ed8;--green:#059669;--gl:#d1fae5;--bdr:rgba(12,12,14,0.08);--ff:'Bricolage Grotesque',sans-serif;--fb:'Instrument Sans',sans-serif}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--fb);background:var(--surf);color:var(--ink);font-size:15px;line-height:1.7;min-height:100vh}
.page{max-width:700px;margin:0 auto;padding:20px 5% 80px}
.ptag{display:inline-flex;align-items:center;background:var(--accl);color:var(--accd);border-radius:99px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
h1{font-family:var(--ff);font-size:clamp(24px,4vw,38px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:8px}
.intro{font-size:15px;color:var(--ink3);margin-bottom:20px}
.box{background:var(--w);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-bottom:16px}
.box h2{font-family:var(--ff);font-size:17px;font-weight:700;margin-bottom:16px}
.fr{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.fr label{font-size:12px;font-weight:500;color:var(--ink3);min-width:140px;flex-shrink:0}
input,select,textarea{flex:1;border:1.5px solid var(--bdr);border-radius:8px;padding:9px 11px;font-size:14px;font-family:var(--fb);color:var(--ink);background:var(--surf);outline:none;transition:border-color .15s;min-width:0}
input:focus,select:focus,textarea:focus{border-color:var(--acc);background:var(--w)}
.rbox{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:12px 16px;min-height:48px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px}
.rbox strong{font-size:20px;font-weight:800;font-family:var(--ff)}
.rbox .u{font-size:12px;color:var(--ink4)}
.mrow{display:flex;gap:6px;margin-bottom:10px}
.mb{flex:1;padding:7px 8px;border-radius:7px;border:1.5px solid var(--bdr);background:var(--surf);color:var(--ink3);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--fb);text-align:center;transition:all .15s}
.mb.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn{background:var(--acc);color:#fff;border:none;border-radius:9px;padding:11px 24px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--fb);transition:all .15s}
.btn:hover{background:var(--accd)}
.cpbtn{background:none;border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--ink4);cursor:pointer;font-family:var(--fb)}
</style>

<body>
<nav style="background:rgba(255,255,255,.97);border-bottom:1px solid rgba(12,12,14,0.08);height:56px;padding:0 4%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(14px)">
  <a style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;color:#0c0c0e;text-decoration:none;display:flex;align-items:center;gap:7px" href="/index.html">
    <span style="width:26px;height:26px;background:#2563ff;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800">W</span>MyWorkKits
  </a>
  <a style="font-size:13px;color:#2563ff;text-decoration:none;font-weight:500" href="/index.html">← All tools</a>
</nav>
<main class="page">
  <div class="ptag">⚖️ Health</div>
  <h1>Ideal Weight Calculator</h1>
  <p class="intro">Find your ideal healthy weight range based on your height, using the most widely referenced formulas.</p>
  <div class="box">
  <h2>Ideal weight calculator</h2>
  <div class="mrow">
    <button class="mb on" onclick="setIWM(this,'cm')">Metric (cm)</button>
    <button class="mb" onclick="setIWM(this,'in')">Imperial (inches)</button>
  </div>
  <div class="fr"><label id="iwhl">Height (cm)</label><input type="number" id="iwh" placeholder="e.g. 175" oninput="calcIW()"></div>
  <div class="fr"><label>Gender</label>
    <select id="iwg" onchange="calcIW()">
      <option value="m">Male</option>
      <option value="f">Female</option>
    </select>
  </div>
  <div class="rbox" id="iwres" style="flex-direction:column;align-items:flex-start;gap:5px"><span style="color:var(--ink4)">Enter height above</span></div>
</div>
</main>
<footer style="background:#1e1e24;color:rgba(255,255,255,.5);font-size:13px;padding:32px 4% 24px;margin-top:40px">
  <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:12px">
    <span>© 2026 MyWorkKits · www.myworkkits.com</span>
    <span>No sign-up · No tracking · Free forever</span>
  </div>
</footer>
<script>let iwMode='cm';
function setIWM(btn,m){iwMode=m;document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('iwhl').textContent=m==='cm'?'Height (cm)':'Height (inches)';calcIW();}
function calcIW(){
  const hv=parseFloat(document.getElementById('iwh').value),g=document.getElementById('iwg').value;
  if(isNaN(hv))return;
  const h=iwMode==='cm'?hv/2.54:hv; // convert to inches for formulas
  const f=n=>n.toFixed(1);
  // Formulas (output in kg)
  const dev=g==='m'?(50+2.3*(h-60)):(45.5+2.3*(h-60));
  const miller=g==='m'?(56.2+1.41*(h-60)):(53.1+1.36*(h-60));
  const hamwi=g==='m'?(48+2.7*(h-60)):(45.4+2.27*(h-60));
  const bmi_low=(18.5*(hv*iwMode==='cm'?hv/10000:(hv*2.54/100)*(hv*2.54/100)));
  const bmi_high=(24.9*(hv*iwMode==='cm'?hv/10000:(hv*2.54/100)*(hv*2.54/100)));
  const hcm=iwMode==='cm'?hv:hv*2.54;
  const bmiL=(18.5*Math.pow(hcm/100,2)).toFixed(1);
  const bmiH=(24.9*Math.pow(hcm/100,2)).toFixed(1);
  document.getElementById('iwres').innerHTML=`
    <div style="font-size:13px"><span style="color:var(--ink4)">Healthy BMI range</span> <strong>${bmiL} – ${bmiH} kg</strong></div>
    <div style="font-size:13px"><span style="color:var(--ink4)">Devine formula</span> <strong>${f(dev)} kg</strong></div>
    <div style="font-size:13px"><span style="color:var(--ink4)">Miller formula</span> <strong>${f(miller)} kg</strong></div>
    <div style="font-size:13px"><span style="color:var(--ink4)">Hamwi formula</span> <strong>${f(hamwi)} kg</strong></div>
    <div style="font-size:11px;color:var(--ink4);margin-top:4px">These are estimates. Consult a doctor for personal health advice.</div>`;
}</script>
